<!DOCTYPE html>

    <link href="https://fonts.googleapis.com" rel="preconnect" />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>
        @font-face {
            font-family: 'Bringbold';
            src: url('assets/Tipografia/Bringbold Nineties/Bringboldninetiesdemo-aY5Wa.otf') format('opentype'),

            font-display: swap;

            src: url('assets/Tipografia/Valencia/Valencia.ttf') format('truetype');

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "azul": "#0551a7",
                        "rosa": "#f1c8df",
                        "creme": "#efefef",
                        "marrom": "#2d1a12",
                    },
                    fontFamily: {
                        "headline": ["Bringbold", "sans-serif"],

                        "slab": ["Staatliches", "sans-serif"],

    <style>

            <div class="pt-4">
